version: "3.9"

services:
  # ─── GOTv3 asosiy bot (Railway'da allaqachon ishlaydi) ───
  # bot:
  #   build: .
  #   env_file: .env

  # ─── Mini App Backend ───
  miniapp-api:
    build: ./miniapp/backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    restart: unless-stopped

  # ─── Mini App Frontend (nginx) ───
  miniapp-frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./miniapp/frontend:/usr/share/nginx/html:ro
      - ./miniapp/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - miniapp-api
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: got_bot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
